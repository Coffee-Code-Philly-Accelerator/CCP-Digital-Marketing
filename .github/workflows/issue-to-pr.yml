name: Issue to PR (Autonomous)

# Triggered when an issue is labeled 'claude-fix' — Claude reads the issue,
# creates a branch, implements the fix, and opens a draft PR.
# Guardrails: protected-path reversion, secret scanning, diff size gate,
# syntax validation (Python + Rust).

on:
  issues:
    types: [labeled]

  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true
        type: number
      dry_run:
        description: 'Dry run (skip PR creation)'
        type: boolean
        default: false

# One fix attempt per issue at a time
concurrency:
  group: issue-to-pr-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Gate: only proceed if the label is 'claude-fix'
  # ===========================================================================
  gate:
    name: Label Gate
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.label.name == 'claude-fix' &&
       github.event.issue.user.login != 'github-actions[bot]' &&
       github.event.issue.user.login != 'dependabot[bot]')
    outputs:
      issue_number: ${{ steps.resolve.outputs.issue_number }}
    steps:
      - name: Resolve issue number
        id: resolve
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "issue_number=${{ inputs.issue_number }}" >> $GITHUB_OUTPUT
          else
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Pre-flight: validate secrets, load protected paths
  # ===========================================================================
  preflight:
    name: Pre-Flight Checks
    runs-on: ubuntu-latest
    needs: gate
    timeout-minutes: 5
    outputs:
      protected_patterns: ${{ steps.load-config.outputs.protected_patterns }}
      issue_title: ${{ steps.issue-info.outputs.title }}
      branch_name: ${{ steps.issue-info.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate required secrets
        run: |
          HAVE_BEDROCK="${{ secrets.AWS_BEARER_TOKEN_BEDROCK != '' }}"
          HAVE_ANTHROPIC="${{ secrets.ANTHROPIC_API_KEY != '' }}"
          if [ "$HAVE_BEDROCK" != "true" ] && [ "$HAVE_ANTHROPIC" != "true" ]; then
            echo "::error::No API provider configured. Add AWS Bedrock credentials OR ANTHROPIC_API_KEY."
            exit 1
          fi
          if [ -z "${{ secrets.PAT_TOKEN }}" ]; then
            echo "::error::PAT_TOKEN required for branch creation and PR submission"
            exit 1
          fi

      - name: Load protected paths config
        id: load-config
        run: |
          CONFIG=".github/config/protected-paths.json"
          if [ -f "$CONFIG" ]; then
            PATTERNS=$(python3 -c "
          import json
          cfg = json.load(open('$CONFIG'))
          print(' '.join(cfg.get('protected_patterns', [])))
          ")
            echo "protected_patterns=$PATTERNS" >> $GITHUB_OUTPUT
          else
            echo "protected_patterns=.github/workflows/* .env* CLAUDE.md Cargo.toml tauri.conf.json" >> $GITHUB_OUTPUT
          fi

      - name: Get issue info
        id: issue-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ needs.gate.outputs.issue_number }}"
          TITLE=$(gh issue view "$ISSUE_NUM" --json title -q '.title')
          # Slugify title for branch name
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | head -c 50 | sed 's/-$//')
          BRANCH="claude-fix/${ISSUE_NUM}-${SLUG}"
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Main: Claude implements the fix
  # ===========================================================================
  implement:
    name: Implement Fix
    runs-on: ubuntu-latest
    needs: [gate, preflight]
    timeout-minutes: 30
    env:
      BEDROCK_CONFIGURED: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK != '' }}
      ANTHROPIC_KEY_SET: ${{ secrets.ANTHROPIC_API_KEY != '' }}
      ISSUE_NUM: ${{ needs.gate.outputs.issue_number }}
      BRANCH_NAME: ${{ needs.preflight.outputs.branch_name }}
      PROTECTED_PATTERNS: ${{ needs.preflight.outputs.protected_patterns }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Create feature branch
        run: |
          git checkout -b "$BRANCH_NAME"
          git push -u origin "$BRANCH_NAME"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation tools
        run: pip install ruff

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # ========== PRIMARY: AWS Bedrock ==========
      - name: Claude Fix (Bedrock - Primary)
        id: bedrock_fix
        if: env.BEDROCK_CONFIGURED == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          use_bedrock: "true"
          show_full_output: true
          prompt_file: .github/prompts/issue-to-pr.md
          prompt: |
            ISSUE_NUMBER: ${{ env.ISSUE_NUM }}
            PROTECTED_PATTERNS: ${{ env.PROTECTED_PATTERNS }}
          claude_args: >-
            --allowed-tools
            "Bash(ruff *),Bash(cargo clippy *),Bash(python scripts/validate_recipes.py),Bash(python -m py_compile *),Bash(git *),Bash(gh issue view:*),Bash(gh pr create:*),Read,Write,Edit,Glob,Grep"
            --max-turns 40
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          CLAUDE_CODE_USE_BEDROCK: "1"

      # ========== FALLBACK: Anthropic Direct API ==========
      - name: Claude Fix (Anthropic - Fallback)
        id: anthropic_fix
        if: |
          env.ANTHROPIC_KEY_SET == 'true' &&
          (env.BEDROCK_CONFIGURED != 'true' || steps.bedrock_fix.outcome != 'success')
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt_file: .github/prompts/issue-to-pr.md
          prompt: |
            ISSUE_NUMBER: ${{ env.ISSUE_NUM }}
            PROTECTED_PATTERNS: ${{ env.PROTECTED_PATTERNS }}
          claude_args: >-
            --allowed-tools
            "Bash(ruff *),Bash(cargo clippy *),Bash(python scripts/validate_recipes.py),Bash(python -m py_compile *),Bash(git *),Bash(gh issue view:*),Bash(gh pr create:*),Read,Write,Edit,Glob,Grep"
            --max-turns 40
        env: {}

  # ===========================================================================
  # Post-implementation guardrails
  # ===========================================================================
  guardrails:
    name: Post-Implementation Guardrails
    runs-on: ubuntu-latest
    needs: [gate, preflight, implement]
    if: always() && needs.implement.result == 'success'
    timeout-minutes: 15
    env:
      BRANCH_NAME: ${{ needs.preflight.outputs.branch_name }}
      PROTECTED_PATTERNS: ${{ needs.preflight.outputs.protected_patterns }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation tools
        run: pip install ruff

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri

      # --- Guardrail 1: Protected-path reversion ---
      - name: Revert protected paths
        run: |
          echo "Checking for changes to protected paths..."
          REVERTED=0
          for pattern in $PROTECTED_PATTERNS; do
            CHANGED=$(git diff --name-only origin/main...HEAD -- "$pattern" 2>/dev/null || true)
            if [ -n "$CHANGED" ]; then
              echo "::warning::Reverting protected file(s): $CHANGED"
              echo "$CHANGED" | while read -r f; do
                git checkout origin/main -- "$f" 2>/dev/null || true
              done
              REVERTED=1
            fi
          done
          if [ "$REVERTED" -eq 1 ]; then
            git add -A
            git commit -m "guardrail: revert changes to protected paths" || true
            git push || true
          fi

      # --- Guardrail 2: Secret scanning ---
      - name: Scan for secrets in diff
        run: |
          echo "Scanning diff for leaked secrets..."
          DIFF=$(git diff origin/main...HEAD)
          PATTERNS=(
            'ANTHROPIC_API_KEY\s*=\s*["\x27]sk-'
            'COMPOSIO_API_KEY\s*=\s*["\x27][a-zA-Z0-9]'
            'AWS_SECRET_ACCESS_KEY\s*=\s*["\x27][a-zA-Z0-9]'
            'OPENAI_API_KEY\s*=\s*["\x27]sk-'
            'GEMINI_API_KEY\s*=\s*["\x27]AI'
            'BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY'
            'ghp_[a-zA-Z0-9]{36}'
            'github_pat_[a-zA-Z0-9_]{82}'
          )
          FOUND=0
          for pat in "${PATTERNS[@]}"; do
            if echo "$DIFF" | grep -qPi "$pat"; then
              echo "::error::Potential secret detected matching pattern: $pat"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Secret scanning failed. PR will not be created."
            exit 1
          fi
          echo "Secret scan: clean"

      # --- Guardrail 3: Diff size gate (1000 lines) ---
      - name: Check diff size
        run: |
          DIFF_LINES=$(git diff --stat origin/main...HEAD | tail -1 | grep -oP '\d+ insertion' | grep -oP '\d+' || echo 0)
          DEL_LINES=$(git diff --stat origin/main...HEAD | tail -1 | grep -oP '\d+ deletion' | grep -oP '\d+' || echo 0)
          TOTAL=$((DIFF_LINES + DEL_LINES))
          echo "Total diff size: $TOTAL lines (insertions: $DIFF_LINES, deletions: $DEL_LINES)"
          if [ "$TOTAL" -gt 1000 ]; then
            echo "::error::Diff exceeds 1000 line gate ($TOTAL lines). AI-generated PRs must be focused."
            exit 1
          fi
          echo "Diff size gate: passed ($TOTAL lines)"

      # --- Guardrail 4: Syntax validation (Python) ---
      - name: Validate Python syntax
        run: |
          echo "Validating Python file syntax..."
          FAILED=0
          for f in $(git diff --name-only origin/main...HEAD | grep '\.py$'); do
            if [ -f "$f" ]; then
              if ! python -m py_compile "$f" 2>&1; then
                echo "::error file=$f::Python syntax error"
                FAILED=1
              fi
            fi
          done
          # Ruff check on changed Python files
          CHANGED_PY=$(git diff --name-only origin/main...HEAD | grep '\.py$' | tr '\n' ' ')
          if [ -n "$CHANGED_PY" ]; then
            ruff check $CHANGED_PY --output-format=github || FAILED=1
          fi
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Python validation failed"
            exit 1
          fi
          echo "Python validation: passed"

      # --- Guardrail 5: Syntax validation (Rust) ---
      - name: Validate Rust syntax
        run: |
          CHANGED_RS=$(git diff --name-only origin/main...HEAD | grep '\.rs$' || true)
          if [ -n "$CHANGED_RS" ]; then
            echo "Validating Rust files: $CHANGED_RS"
            cd gui/src-tauri && cargo clippy -- -D warnings
          else
            echo "No Rust files changed, skipping clippy"
          fi

      # --- Guardrail 6: Recipe validation ---
      - name: Validate recipes
        run: |
          CHANGED_RECIPES=$(git diff --name-only origin/main...HEAD | grep 'recipes/' || true)
          if [ -n "$CHANGED_RECIPES" ]; then
            echo "Validating recipe patterns..."
            python scripts/validate_recipes.py
          else
            echo "No recipe files changed, skipping recipe validation"
          fi

  # ===========================================================================
  # Create draft PR (after guardrails pass)
  # ===========================================================================
  create-pr:
    name: Create Draft PR
    runs-on: ubuntu-latest
    needs: [gate, preflight, implement, guardrails]
    if: >-
      always() &&
      needs.implement.result == 'success' &&
      needs.guardrails.result == 'success' &&
      github.event.inputs.dry_run != 'true'
    timeout-minutes: 5
    env:
      ISSUE_NUM: ${{ needs.gate.outputs.issue_number }}
      BRANCH_NAME: ${{ needs.preflight.outputs.branch_name }}
      ISSUE_TITLE: ${{ needs.preflight.outputs.issue_title }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          fetch-depth: 0

      - name: Create draft PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Check if PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH_NAME" --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "::notice::PR #$EXISTING already exists for branch $BRANCH_NAME"
            exit 0
          fi

          DIFF_STAT=$(git diff --stat origin/main...HEAD | tail -1)
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | head -20)

          gh pr create \
            --draft \
            --title "fix: $ISSUE_TITLE" \
            --label "ai-generated,needs-human-review,issue-fix" \
            --body "$(cat <<EOF
          ## Summary

          Automated fix for #${ISSUE_NUM}.

          ## Changes

          \`\`\`
          ${DIFF_STAT}
          \`\`\`

          <details>
          <summary>Files changed</summary>

          \`\`\`
          ${CHANGED_FILES}
          \`\`\`
          </details>

          ## Guardrails Passed

          - [x] Protected-path reversion check
          - [x] Secret scanning
          - [x] Diff size gate (< 1000 lines)
          - [x] Python syntax validation (py_compile + ruff)
          - [x] Rust syntax validation (cargo clippy)
          - [x] Recipe pattern validation

          ## Review Checklist

          - [ ] Changes correctly address the issue
          - [ ] No unintended side effects
          - [ ] Design principles followed (Let It Crash, KISS, Pure Functions)
          - [ ] Recipe helpers synced if modified (see CLAUDE.md)

          ---
          *Generated by Issue-to-PR automation. Requires human review before merge.*

          Closes #${ISSUE_NUM}
          EOF
          )"

          PR_URL=$(gh pr list --head "$BRANCH_NAME" --json url -q '.[0].url')
          echo "::notice::Draft PR created: $PR_URL"

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          PR_URL=$(gh pr list --head "$BRANCH_NAME" --json url -q '.[0].url')
          if [ -n "$PR_URL" ]; then
            gh issue comment "$ISSUE_NUM" --body "A draft PR has been created to address this issue: $PR_URL

          Please review the changes before merging. The PR has passed automated guardrails (protected-path reversion, secret scanning, diff size gate, syntax validation).

          Labels: \`ai-generated\`, \`needs-human-review\`, \`issue-fix\`"
          fi
