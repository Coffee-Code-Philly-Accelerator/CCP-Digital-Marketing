name: Claude Code Interactive

# Phase 3 integration: Agentic AI assistant triggered by @claude mentions
# Responds to @claude in PR comments, issue comments, and review comments
# Uses Bedrock primary with Anthropic fallback (same pattern as claude-review in ci.yml)
#
# Usage examples:
#   @claude explain this function
#   @claude suggest a fix for this bug
#   @claude review the security implications of this change
#   @claude help me write tests for this module

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Only one Claude interaction per PR/issue at a time
concurrency:
  group: claude-interactive-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    name: Claude Code Assistant
    # Only trigger when @claude is mentioned, skip bot comments
    if: |
      contains(github.event.comment.body, '@claude') &&
      github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      BEDROCK_CONFIGURED: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK != '' }}
      ANTHROPIC_KEY_SET: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate API provider
        run: |
          if [ "${{ env.BEDROCK_CONFIGURED }}" != "true" ] && [ "${{ env.ANTHROPIC_KEY_SET }}" != "true" ]; then
            echo "::error::No API provider configured. Add AWS Bedrock credentials OR ANTHROPIC_API_KEY."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Create PAL MCP Config
        run: |
          cat > /tmp/pal-mcp-config.json << EOF
          {
            "mcpServers": {
              "pal": {
                "command": "uvx",
                "args": ["--from", "git+https://github.com/BeehiveInnovations/pal-mcp-server.git", "pal-mcp-server"],
                "env": {
                  "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}",
                  "OPENAI_API_KEY": "${{ secrets.OPENAI_API_KEY }}"
                }
              }
            }
          }
          EOF

      # ========== PRIMARY: AWS Bedrock ==========
      - name: Claude Code (Bedrock - Primary)
        id: bedrock
        if: env.BEDROCK_CONFIGURED == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: "true"
          trigger_phrase: "@claude"
          timeout_minutes: 15
          claude_args: >-
            --mcp-config /tmp/pal-mcp-config.json
            --allowed-tools
            "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(pytest:*),Bash(ruff:*),Read,Glob,Grep,mcp__pal__chat,mcp__pal__thinkdeep,mcp__pal__codereview,mcp__pal__consensus,mcp__pal__listmodels"
            --max-turns 20
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          CLAUDE_CODE_USE_BEDROCK: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # ========== FALLBACK: Anthropic Direct API ==========
      - name: Claude Code (Anthropic - Fallback)
        id: anthropic
        if: |
          env.ANTHROPIC_KEY_SET == 'true' &&
          (env.BEDROCK_CONFIGURED != 'true' || steps.bedrock.outcome != 'success')
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          timeout_minutes: 15
          claude_args: >-
            --mcp-config /tmp/pal-mcp-config.json
            --allowed-tools
            "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(pytest:*),Bash(ruff:*),Read,Glob,Grep,mcp__pal__chat,mcp__pal__thinkdeep,mcp__pal__codereview,mcp__pal__consensus,mcp__pal__listmodels"
            --max-turns 20
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
