name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================================================
  # LINTING - Ruff check (errors, style, security, bugs)
  # ============================================================================
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check scripts/ recipes/ --output-format=github

  # ============================================================================
  # FORMAT - Ruff format --check (consistent code style)
  # ============================================================================
  format:
    name: Format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check scripts/ recipes/

  # ============================================================================
  # RECIPE VALIDATION - Structural checks on Rube MCP recipes
  # ============================================================================
  recipe-validation:
    name: Recipe Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate recipe patterns
        run: python scripts/validate_recipes.py

  # ============================================================================
  # SECURITY - Bandit + pip-audit
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit

      - name: Run Bandit security scan
        run: bandit -r scripts/ recipes/ -ll --format json --output bandit-report.json || true

      - name: Parse Bandit results
        run: |
          python << 'PYEOF'
          import json
          from pathlib import Path

          report_path = Path("bandit-report.json")
          if not report_path.exists():
              print("No security issues found (no report generated)")
              raise SystemExit(0)

          report = json.loads(report_path.read_text())
          high_issues = [r for r in report.get("results", []) if r.get("issue_severity") == "HIGH"]
          medium_issues = [r for r in report.get("results", []) if r.get("issue_severity") == "MEDIUM"]

          print(f"Security scan complete:")
          print(f"  High severity issues: {len(high_issues)}")
          print(f"  Medium severity issues: {len(medium_issues)}")

          if high_issues:
              print("\nHigh severity issues found:")
              for issue in high_issues:
                  print(f"  - {issue['filename']}:{issue['line_number']}: {issue['issue_text']}")
              raise SystemExit(1)
          PYEOF

      - name: Check dependencies for vulnerabilities
        run: |
          pip install pip-audit
          pip-audit -r scripts/requirements.txt --desc || true

      - name: Upload security report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-report
          path: bandit-report.json
          if-no-files-found: ignore

  # ============================================================================
  # TEST - pytest across Python version matrix
  # ============================================================================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ============================================================================
  # CARGO CHECK - Rust/Tauri lint and format validation
  # ============================================================================
  cargo-check:
    name: Cargo Check (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri

      - name: Run clippy
        working-directory: gui/src-tauri
        run: cargo clippy -- -D warnings

      - name: Check formatting
        working-directory: gui/src-tauri
        run: cargo fmt -- --check

  # ============================================================================
  # DESIGN PRINCIPLES - Automated enforcement of CLAUDE.md rules
  # ============================================================================
  design-principles:
    name: Design Principles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Let It Crash: check for unauthorized try/except"
        run: |
          echo "Checking Let It Crash principle compliance..."
          FOUND=0

          # Count try/except blocks in recipe source files (excluding mock guards)
          for f in recipes/*.py; do
            [ "$(basename "$f")" = "auth_setup.py" ] && continue

            VIOLATIONS=$(grep -n '^\s*except ' "$f" | grep -v 'except NameError' | grep -v '# LET-IT-CRASH-EXCEPTION' || true)
            if [ -n "$VIOLATIONS" ]; then
              echo "::error file=$f::Unauthorized try/except in recipe (Let It Crash violation)"
              echo "$VIOLATIONS"
              FOUND=1
            fi
          done

          for f in scripts/*.py; do
            [ "$(basename "$f")" = "validate_recipes.py" ] && continue
            BARE_EXCEPT=$(grep -n '^\s*except\s*:' "$f" || true)
            if [ -n "$BARE_EXCEPT" ]; then
              echo "::error file=$f::Bare 'except:' clause (must specify exception type)"
              echo "$BARE_EXCEPT"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 0 ]; then
            echo "Let It Crash compliance: OK"
          fi
          exit $FOUND

      - name: "KISS: check complexity metrics"
        run: |
          echo "Checking KISS metrics..."

          for f in $(find scripts recipes -name "*.py"); do
            LINES=$(wc -l < "$f")
            if [ "$LINES" -gt 700 ]; then
              echo "::warning file=$f::File has $LINES lines (KISS threshold: 500)"
            fi
          done

          for f in $(find scripts recipes -name "*.py"); do
            DEEP=$(grep -n '^\s\{16,\}[^ ]' "$f" || true)
            if [ -n "$DEEP" ]; then
              echo "::warning file=$f::Deep nesting detected (>3 levels)"
            fi
          done

          echo "KISS metrics check complete"

      - name: "Pure Functions: check for global state mutation"
        run: |
          echo "Checking for global state mutations..."

          for f in $(find scripts recipes -name "*.py"); do
            GLOBALS=$(grep -n '^\s\+global ' "$f" || true)
            if [ -n "$GLOBALS" ]; then
              echo "::error file=$f::Use of 'global' keyword (violates Pure Functions principle)"
              echo "$GLOBALS"
            fi
          done

          echo "Pure Functions check complete"

  # ============================================================================
  # CLAUDE CODE REVIEW - Anthropic API via ANTHROPIC_API_KEY
  # ============================================================================
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    needs: [lint]
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR context
        id: pr_context
        run: |
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "pr_title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l | tr -d ' ')
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR against the project's CLAUDE.md design principles.

            **PR**: #${{ steps.pr_context.outputs.pr_number }} - ${{ steps.pr_context.outputs.pr_title }}
            **Files Changed**: ${{ steps.pr_context.outputs.files_changed }}

            Focus on:
            - Zero try/except policy (Let It Crash). Flag ANY try/except without # LET-IT-CRASH-EXCEPTION.
            - KISS: unnecessary complexity, premature abstractions, clever one-liners
            - Pure Functions: side effects in business logic that should be pure
            - SOLID violations (especially SRP and OCP)
            - Recipe pattern compliance (os.environ.get, run_composio_tool, invoke_llm, bare variable output)
            - Security: XSS, path traversal, injection vulnerabilities

            IMPORTANT: Do NOT suggest adding try/except blocks, defensive error handling, retry logic, or fallback chains.
          claude_args: "--max-turns 5"

  # ============================================================================
  # All checks gate: single status for branch protection
  # ============================================================================
  ci-pass:
    name: CI Pass
    if: always()
    needs:
      - lint
      - format
      - recipe-validation
      - security
      - test
      - cargo-check
      - design-principles
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          RESULTS="${{ needs.lint.result }} ${{ needs.format.result }} ${{ needs.recipe-validation.result }} ${{ needs.security.result }} ${{ needs.test.result }} ${{ needs.cargo-check.result }} ${{ needs.design-principles.result }}"

          echo "Job results: $RESULTS"

          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi

          echo "All CI checks passed"
